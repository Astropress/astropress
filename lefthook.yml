pre-commit:
  parallel: true
  commands:
    biome:
      glob: "packages/**/*.{ts,js,astro,json}"
      run: bunx @biomejs/biome@1 check --no-errors-on-unmatched {staged_files}
      stage_fixed: true

    staged-tests:
      glob: "packages/astropress/{src,tests,web-components}/**/*.ts"
      run: bun run test:staged

    audit-arch:
      glob: "packages/**/*.ts"
      run: bun run audit:arch

    stryker-contamination:
      # Defense-in-depth: Stryker's inPlace:true has been removed from all
      # configs, but this catches any leaks (stryMutAct_*, stryCov_*,
      # @ts-nocheck headers, bin/ file-mode drops) that slip into staged
      # diffs. Runs on every commit; cost is negligible (~50ms).
      run: bun run tooling/scripts/check-stryker-contamination.ts

    # Previous monolithic ci-audits block ran all 37 audits serially on any
    # packages/**/*.ts change (~48s). Split into ~30 parallel commands, each
    # with a narrow glob so most commits fire only 3–5 audits. Slow whole-repo
    # audits (deps:graph, tooling-types, docs:api:check, docs:check) moved to
    # pre-push where they're amortized across a batch.

    audit-deps:
      glob: ["package.json", "bun.lock", "packages/*/package.json"]
      run: bun run audit:deps

    check-version:
      glob: "packages/astropress/package.json"
      run: bun run check:version

    audit-arch-rust:
      glob: "crates/**/*.rs"
      run: bun run audit:arch:rust

    audit-codeql-patterns:
      glob: "packages/**/*.{ts,astro}"
      run: bun run audit:codeql-patterns

    audit-security:
      glob: "packages/astropress/{src,pages,components}/**/*.{ts,astro}"
      run: bun run audit:security

    audit-suppressions:
      glob: "packages/**/*.{ts,astro}"
      run: bun run audit:suppressions

    audit-honesty:
      glob: ["packages/**/*.{ts,astro,md}", "README.md", "AGENTS.md", "CHANGELOG.md"]
      run: bun run audit:honesty

    audit-microcopy:
      glob: "packages/**/*.{ts,astro}"
      run: bun run audit:microcopy

    audit-aeo:
      glob:
        - "packages/astropress/components/*Aeo*.astro"
        - "packages/astropress/components/*Seo*.astro"
        - "packages/astropress/components/AstropressContentLayout.astro"
        - "packages/astropress/src/aeo-metadata.ts"
        - "packages/astropress/src/sitemap*.ts"
        - "packages/astropress/public/llms.txt"
        - "packages/astropress/components/DonateAction.astro"
      run: bun run audit:aeo

    audit-providers:
      glob: ["AGENTS.md", "tooling/verified-providers.json", "packages/astropress/src/provider*.ts"]
      run: bun run audit:providers

    audit-cli-docs:
      glob: ["crates/**/*.rs", "crates/**/*.toml", "docs/**/*.md"]
      run: bun run audit:cli-docs

    audit-env-contract:
      glob: "packages/astropress/src/**/*.ts"
      run: bun run audit:env-contract

    audit-exports:
      glob: ["packages/astropress/src/adapters/**", "packages/astropress/tests/**/*.test.ts"]
      run: bun run audit:exports

    audit-crypto:
      glob: "packages/astropress/src/**/*.ts"
      run: bun run audit:crypto

    audit-web-components:
      glob: ["packages/astropress/web-components/**/*.ts", "packages/astropress/index.ts"]
      run: bun run audit:web-components

    audit-navigation:
      glob:
        - "packages/astropress/public/admin.css"
        - "packages/astropress/web-components/admin-nav.ts"
        - "packages/astropress/src/admin-ui.ts"
        - "packages/astropress/pages/ap-admin/**"
        - "crates/astropress-cli/src/cli_config/**"
      run: bun run audit:navigation

    audit-interaction:
      glob:
        - "packages/astropress/public/admin.css"
        - "packages/astropress/web-components/**/*.ts"
        - "packages/astropress/pages/**"
        - "packages/astropress/components/**"
      run: bun run audit:interaction

    audit-error-handling:
      glob:
        - "packages/astropress/src/admin-action*.ts"
        - "packages/astropress/src/runtime-admin-actions*.ts"
        - "packages/astropress/src/deploy*.ts"
        - "packages/astropress/src/cache-purge*.ts"
      run: bun run audit:error-handling

    audit-caching:
      glob:
        - "packages/astropress/src/cache*.ts"
        - "packages/astropress/src/cloudflare-cache*.ts"
        - "packages/astropress/src/webhook*.ts"
        - "packages/astropress/src/security-headers.ts"
      run: bun run audit:caching

    audit-nexus:
      glob: "packages/astropress-nexus/**"
      run: bun run audit:nexus

    audit-developer-ergonomics:
      glob: ["README.md", "AGENTS.md", "packages/astropress/README.md", "crates/**/*.rs", "packages/astropress/src/scaffold/**"]
      run: bun run audit:developer-ergonomics

    audit-dead-exports:
      glob: ["packages/astropress/src/**/*.ts", "packages/astropress/index.ts"]
      run: bun run audit:dead-exports

    audit-bdd-wiring:
      glob:
        - "tooling/bdd/**/*.feature"
        - "packages/astropress/tests/**/*.test.ts"
        - "packages/astropress-nexus/tests/**/*.test.ts"
      run: bun run audit:bdd-wiring

    audit-no-stub-tests:
      glob: ["packages/**/tests/**/*.test.ts", "crates/**/*.rs"]
      run: bun run audit:no-stub-tests

    audit-evaluation-integrity:
      glob:
        - "docs/reference/EVALUATION.md"
        - "package.json"
        - ".github/workflows/ci.yml"
        - "tooling/scripts/audit-*.ts"
      run: bun run audit:evaluation-integrity

    audit-observability:
      glob: "packages/astropress/src/**/*.ts"
      run: bun run audit:observability

    audit-api-design:
      glob:
        - "packages/astropress/src/api-*.ts"
        - "packages/astropress/src/page-handlers/**"
        - "packages/astropress/pages/ap-api/**"
      run: bun run audit:api-design

    audit-ai-drivability:
      glob: ["AGENTS.md", "packages/astropress/**/llms.txt", "packages/astropress/src/**/*.ts"]
      run: bun run audit:ai-drivability

    audit-i18n:
      glob:
        - "packages/astropress/src/locale-links.ts"
        - "packages/astropress/src/admin-i18n.ts"
        - "packages/astropress/src/admin-locale-links.ts"
        - "packages/astropress/src/translation-state.ts"
        - "tooling/bdd/admin/i18n.feature"
      run: bun run audit:i18n

    audit-content-modeling:
      glob: ["packages/astropress/src/content-modeling.ts", "packages/astropress/src/platform-contracts.ts"]
      run: bun run audit:content-modeling

    audit-collaboration:
      glob:
        - "packages/astropress/src/content-locking*.ts"
        - "packages/astropress/src/d1-locking*.ts"
        - "packages/astropress/src/sqlite-locking*.ts"
        - "packages/astropress/web-components/lock*.ts"
      run: bun run audit:collaboration

    audit-oss-health:
      glob:
        - "LICENSE"
        - "CONTRIBUTING.md"
        - "CODE_OF_CONDUCT.md"
        - "SECURITY.md"
        - "CHANGELOG.md"
        - "README.md"
        - ".github/ISSUE_TEMPLATE/**"
      run: bun run audit:oss-health

    audit-scaffold-quality:
      glob:
        - "packages/astropress/src/scaffold/**"
        - "crates/astropress-cli/src/doctor*.rs"
        - "crates/astropress-cli/src/scaffold*.rs"
        - "packages/astropress/bin/**"
      run: bun run audit:scaffold-quality

    audit-playwright-projects:
      glob: ["tooling/e2e/playwright.config.ts", "package.json"]
      run: bun run audit:playwright-projects

    audit-mutation-scope:
      glob:
        - "packages/astropress/src/auth-*.ts"
        - "packages/astropress/src/security-*.ts"
        - "packages/astropress/src/runtime-admin-*.ts"
        - "tooling/stryker/stryker*.config.mjs"
      run: bun run audit:mutation-scope

    # DO NOT REMOVE — guards against silent erosion of the mutation-coverage
    # quality bar. If this trips, fix tests or refactor code; do not lower the
    # threshold. See tooling/scripts/audit-stryker-thresholds.ts header.
    audit-stryker-thresholds:
      glob: "tooling/stryker/stryker*.config.mjs"
      run: bun run tooling/scripts/audit-stryker-thresholds.ts

    # Non-blocking warning: surfaces Stryker disable / v8 ignore / biome-ignore
    # / @ts-ignore comments so the author considers a code-level fix instead.
    audit-suppression-warnings:
      glob: "{packages,tooling}/**/*.{ts,tsx,js,mjs,cjs}"
      run: bun run tooling/scripts/audit-suppression-warnings.ts {staged_files}

    audit-ci-sarif-upload:
      glob: ".github/workflows/*.yml"
      run: bun run audit:ci-sarif-upload

    audit-nuclei-suppressions:
      glob: ".github/workflows/*.yml"
      run: bun run audit:nuclei-suppressions

    bdd-lint:
      glob: "tooling/bdd/**/*.feature"
      run: bun run bdd:lint

    rust-clippy:
      glob: "crates/**/*.rs"
      run: cargo clippy --offline -p astropress-cli --manifest-path crates/Cargo.toml -- -D warnings

    no-secrets:
      run: |
        if git diff --cached --name-only | grep -qE '(^|/)\.env(\.|$)'; then
          echo "Refusing to commit .env files — remove them from the staging area."
          exit 1
        fi

    verify-signing:
      run: |
        # Commits to main require a GPG or SSH signature (enforced by the
        # GitHub branch ruleset). Verify both that config is correct AND that
        # the key can actually produce a signature right now, so a silent
        # failure (agent not running, wrong passphrase, etc.) is caught before
        # the commit rather than discovered after a push is rejected.
        gpgsign=$(git config --get commit.gpgsign 2>/dev/null || true)
        if [ "$gpgsign" != "true" ]; then
          echo ""
          echo "❌  Commit signing is not configured locally."
          echo "    GitHub requires signed commits on main."
          echo ""
          echo "    GPG key:  git config --global commit.gpgsign true"
          echo "              git config --global user.signingkey <KEY-ID>"
          echo ""
          echo "    SSH key:  git config --global gpg.format ssh"
          echo "              git config --global user.signingkey /path/to/key.pub"
          echo "              git config --global commit.gpgsign true"
          echo ""
          echo "    See AGENTS.md § Signing setup for full instructions."
          exit 1
        fi
        signingkey=$(git config --get user.signingkey 2>/dev/null || true)
        gpg_format=$(git config --get gpg.format 2>/dev/null || echo "openpgp")
        if [ -z "$signingkey" ] && [ "$gpg_format" = "openpgp" ]; then
          echo ""
          echo "❌  commit.gpgsign is true but user.signingkey is not set."
          echo "    Find your key ID: gpg --list-secret-keys --keyid-format=long"
          echo "    Then: git config --global user.signingkey <KEY-ID>"
          echo ""
          exit 1
        fi
        # Perform a live test-sign to confirm the key is accessible right now.
        # This catches 'agent not running' and similar silent failures that
        # would otherwise produce an unsigned commit without any error.
        if [ "$gpg_format" = "ssh" ]; then
          key_file="$signingkey"
          # Strip leading ~ manually in POSIX sh
          case "$key_file" in
            "~/"*) key_file="$HOME/${key_file#~/}" ;;
          esac
          if ! printf 'test' | ssh-keygen -Y sign -f "$key_file" -n git - >/dev/null 2>&1; then
            echo ""
            echo "❌  SSH signing key is configured but could not sign."
            echo "    Is your SSH agent running and does it have the key loaded?"
            echo "    Check: ssh-add -l"
            echo "    Load:  ssh-add $key_file"
            echo ""
            exit 1
          fi
        else
          if ! printf 'test' | gpg --sign --batch --quiet --output /dev/null 2>/dev/null; then
            echo ""
            echo "❌  GPG key is configured but could not sign."
            echo "    Is gpg-agent running?  gpgconf --launch gpg-agent"
            echo ""
            exit 1
          fi
        fi
        # Also reject creating new commits on top of unsigned branch history.
        # GitHub checks the full PR range against the default branch, not just
        # the newest commit, so local hooks must do the same.
        default_ref=""
        if git symbolic-ref -q refs/remotes/origin/HEAD >/dev/null 2>&1; then
          default_ref=$(git symbolic-ref --short refs/remotes/origin/HEAD)
        elif git rev-parse --verify origin/main >/dev/null 2>&1; then
          default_ref="origin/main"
        elif git rev-parse --verify main >/dev/null 2>&1; then
          default_ref="main"
        fi
        if [ -n "$default_ref" ]; then
          unsigned=""
          commits=$(git rev-list "${default_ref}..HEAD" 2>/dev/null || true)
          for commit in $commits; do
            sig=$(git log --format="%G?" -1 "$commit" 2>/dev/null || echo "N")
            if [ "$sig" = "N" ]; then
              unsigned="$unsigned\n  $(git log --format='%h %s' -1 "$commit")"
            fi
          done
          if [ -n "$unsigned" ]; then
            echo ""
            echo "❌  This branch already contains unsigned commits relative to ${default_ref}:"
            printf "%b\n" "$unsigned"
            echo ""
            echo "    Re-sign them before creating more commits on top:"
            echo "    git rebase --rebase-merges --exec 'git commit --amend -S --no-edit --no-verify' ${default_ref}"
            echo ""
            exit 1
          fi
        fi

commit-msg:
  commands:
    format:
      run: |
        if [ -d .git/rebase-merge ] || [ -d .git/rebase-apply ]; then
          exit 0
        fi
        msg=$(head -1 {1})
        echo "$msg" | grep -qE '^(Merge|Revert|fixup!|squash!)' && exit 0
        if ! echo "$msg" | grep -qE '^(feat|fix|chore|docs|test|refactor|perf|ci|build|revert)(\(.+\))?: .{1,72}$'; then
          echo "Commit message must follow conventional commits format:"
          echo "  type(scope)?: subject  (subject max 72 chars)"
          echo "  Types: feat fix chore docs test refactor perf ci build revert"
          exit 1
        fi

pre-push:
  parallel: true
  commands:
    gates:
      run: bun run test:prepush

    # DO NOT REMOVE OR RELAX — closes the gap the pre-commit threshold audit
    # leaves open. Runs Stryker mutation testing scoped to files changed on
    # this branch vs. origin/main, so the check is fast (≈ 60s) but still
    # blocks PRs whose new code scores below the 95% floor. See the script
    # header for the full rationale.
    mutation-gate:
      run: bun run tooling/scripts/prepush-mutation-gate.ts

    slow-audits:
      # Whole-repo static audits moved out of pre-commit because they scan far
      # beyond any changed file. Amortized across a push (not per-commit) these
      # add ~15–20s to pre-push wall-clock but nothing to pre-commit feedback.
      run: >-
        bun run audit:deps:graph &&
        bun run audit:tooling-types &&
        bun run docs:api:check &&
        bun run docs:check

    verify-commits-signed:
      run: |
        # Walk every commit in the PR range and reject the push if any of them
        # lack a signature. GitHub evaluates the full default-branch diff, not
        # only commits newer than the branch upstream. git log --format="%G?"
        # returns:
        #   G  good signature          U  unknown key (sig present)
        #   X  expired sig             Y  expired key
        #   E  key not in allowedSigners (SSH, sig present but unverified)
        #   N  NO signature at all  ← the only value we must reject
        #
        # Note: E is normal for SSH-signed commits when gpg.ssh.allowedSignersFile
        # is not configured in CI; the signature still exists, we just can't
        # verify trust.  We only block N.
        default_ref=""
        if git symbolic-ref -q refs/remotes/origin/HEAD >/dev/null 2>&1; then
          default_ref=$(git symbolic-ref --short refs/remotes/origin/HEAD)
        elif git rev-parse --verify origin/main >/dev/null 2>&1; then
          default_ref="origin/main"
        elif git rev-parse --verify main >/dev/null 2>&1; then
          default_ref="main"
        fi
        if [ -n "$default_ref" ]; then
          commits=$(git rev-list "${default_ref}..HEAD" 2>/dev/null || true)
        else
          commits=$(git rev-list HEAD --not --remotes 2>/dev/null || true)
        fi
        if [ -z "$commits" ]; then
          exit 0
        fi
        unsigned=""
        for commit in $commits; do
          sig=$(git log --format="%G?" -1 "$commit" 2>/dev/null || echo "N")
          if [ "$sig" = "N" ]; then
            unsigned="$unsigned\n  $(git log --format='%h %s' -1 "$commit")"
          fi
        done
        if [ -n "$unsigned" ]; then
          echo ""
          echo "❌  The following commits are not signed:"
          printf "%b\n" "$unsigned"
          echo ""
          echo "    Re-sign the range with:"
          echo "    git rebase --rebase-merges --exec 'git commit --amend -S --no-edit --no-verify' \\"
          if [ -n "$default_ref" ]; then
            echo "      ${default_ref}"
          else
            echo "      \$(git rev-list HEAD --not --remotes | tail -1)^"
          fi
          echo ""
          exit 1
        fi
        echo "✔ All pushed commits carry a signature."

    sweep-tmp:
      # Reclaim /tmp + .stryker-tmp before pre-push gates fire — test runs
      # leave per-case tmpdirs and crashed Stryker runs leave sandbox dirs
      # under .stryker-tmp/. Anything untouched for an hour is from a prior
      # crashed run, safe to delete. Never kills running processes.
      run: |
        find /tmp -maxdepth 1 \( -name 'astropress-cli-*' -o -name 'astropress-*' \) \
          -mmin +60 -exec rm -rf {} + 2>/dev/null || true
        find .stryker-tmp -maxdepth 1 -mindepth 1 -type d -name 'sandbox-*' \
          -mmin +60 -exec rm -rf {} + 2>/dev/null || true
