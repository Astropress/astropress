pre-commit:
  parallel: true
  commands:
    biome:
      glob: "packages/**/*.{ts,js,astro,json}"
      run: bunx biome check --no-errors-on-unmatched {staged_files}
      stage_fixed: true

    audit-arch:
      glob: "packages/**/*.ts"
      run: bun run audit:arch

    bdd-lint:
      glob: "tooling/bdd/**/*.feature"
      run: bun run bdd:lint

    no-secrets:
      run: |
        if git diff --cached --name-only | grep -qE '(^|/)\.env(\.|$)'; then
          echo "Refusing to commit .env files — remove them from the staging area."
          exit 1
        fi

    verify-signing:
      run: |
        # Commits to main require a GPG or SSH signature (enforced by the
        # GitHub branch ruleset). Catch mis-configuration before git does,
        # so the error message explains how to fix it.
        gpgsign=$(git config --get commit.gpgsign 2>/dev/null || true)
        if [ "$gpgsign" != "true" ]; then
          echo ""
          echo "❌  Commit signing is not configured locally."
          echo "    GitHub requires signed commits on main."
          echo ""
          echo "    GPG key:  git config --global commit.gpgsign true"
          echo "              git config --global user.signingkey <KEY-ID>"
          echo ""
          echo "    SSH key:  git config --global gpg.format ssh"
          echo "              git config --global user.signingkey /path/to/key.pub"
          echo "              git config --global commit.gpgsign true"
          echo ""
          echo "    See AGENTS.md § Signing setup for full instructions."
          exit 1
        fi
        signingkey=$(git config --get user.signingkey 2>/dev/null || true)
        gpg_format=$(git config --get gpg.format 2>/dev/null || echo "openpgp")
        if [ -z "$signingkey" ] && [ "$gpg_format" = "openpgp" ]; then
          echo ""
          echo "❌  commit.gpgsign is true but user.signingkey is not set."
          echo "    Find your key ID: gpg --list-secret-keys --keyid-format=long"
          echo "    Then: git config --global user.signingkey <KEY-ID>"
          echo ""
          exit 1
        fi

commit-msg:
  commands:
    format:
      run: |
        msg=$(head -1 {1})
        echo "$msg" | grep -qE '^(Merge|Revert|fixup!|squash!)' && exit 0
        if ! echo "$msg" | grep -qE '^(feat|fix|chore|docs|test|refactor|perf|ci|build|revert)(\(.+\))?: .{1,72}$'; then
          echo "Commit message must follow conventional commits format:"
          echo "  type(scope)?: subject  (subject max 72 chars)"
          echo "  Types: feat fix chore docs test refactor perf ci build revert"
          exit 1
        fi

pre-push:
  parallel: true
  commands:
    gates:
      run: bun run test:prepush

    sweep-tmp:
      # Reclaim /tmp before pre-push gates fire — test runs leave per-case
      # tmpdirs and the sandbox is small (typically tmpfs ≤ 1G). Anything
      # untouched for an hour is from a prior crashed run, safe to delete.
      run: |
        find /tmp -maxdepth 1 \( -name 'astropress-cli-*' -o -name 'astropress-*' \) \
          -mmin +60 -exec rm -rf {} + 2>/dev/null || true
