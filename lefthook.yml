pre-commit:
  parallel: true
  commands:
    biome:
      glob: "packages/**/*.{ts,js,astro,json}"
      run: bunx biome check --no-errors-on-unmatched {staged_files}
      stage_fixed: true

    audit-sync:
      run: bun run audit:sync

    audit-arch:
      run: bun run audit:arch

    bdd-lint:
      glob: "tooling/bdd/**/*.feature"
      run: bun run bdd:lint

    no-secrets:
      run: |
        if git diff --cached --name-only | grep -qE '(^|/)\.env(\.|$)'; then
          echo "Refusing to commit .env files — remove them from the staging area."
          exit 1
        fi

commit-msg:
  commands:
    format:
      run: |
        msg=$(cat {1})
        if ! echo "$msg" | grep -qE '^(feat|fix|chore|docs|test|refactor|perf|ci|build|revert)(\(.+\))?: .{1,72}'; then
          echo "Commit message must follow conventional commits format:"
          echo "  type(scope)?: subject  (subject max 72 chars)"
          echo "  Types: feat fix chore docs test refactor perf ci build revert"
          exit 1
        fi

pre-push:
  parallel: true
  commands:
    gates:
      run: bun run audit:arch && bun run audit:arch:rust && bun run bdd:lint && bun run bdd:test

    coverage:
      run: bun run test:coverage

    test-cli:
      run: bun run test:cli

    docs-api:
      run: bun run docs:api:check

    check-version:
      run: bun run check:version
