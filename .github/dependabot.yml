version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      astro:
        patterns:
          - "astro"
          - "@astrojs/*"
      vitest:
        patterns:
          - "vitest*"
          - "@vitest/*"
      dev-tooling:
        patterns:
          - "playwright*"
          - "@playwright/*"
          - "axe-core*"
          - "@axe-core/*"

  - package-ecosystem: "cargo"
    directory: "/crates/astropress-cli"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
