version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore"
      prefix-development: "chore"
      include: "scope"
    labels:
      - "dependencies"
    groups:
      astro:
        patterns:
          - "astro"
          - "@astrojs/*"
      vitest:
        patterns:
          - "vitest*"
          - "@vitest/*"
      dev-tooling:
        patterns:
          - "playwright*"
          - "@playwright/*"
          - "axe-core*"
          - "@axe-core/*"
      biome:
        patterns:
          - "@biomejs/*"
      changesets:
        patterns:
          - "@changesets/*"

  - package-ecosystem: "cargo"
    directory: "/crates"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    commit-message:
      prefix: "chore"
      include: "scope"
    labels:
      - "dependencies"
    groups:
      cargo-all:
        patterns:
          - "*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "ci"
      include: "scope"
    labels:
      - "dependencies"
    groups:
      actions-all:
        patterns:
          - "*"
