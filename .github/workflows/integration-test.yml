name: Integration Tests

on:
  push:
  pull_request:

jobs:
  d1-local-integration:
    name: D1 local integration tests (no credentials required)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24.8"
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"
      - name: Install dependencies
        run: bun install
      - name: Build package (required for node:sqlite exports)
        run: bun run --filter "@astropress-diy/astropress" build
      - name: D1 local integration tests
        run: bun run --filter "@astropress-diy/astropress" test --reporter=verbose tests/d1-local-integration.test.ts
