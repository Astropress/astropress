name: Integration Tests

on:
  push:
  pull_request:

jobs:
  d1-local-integration:
    name: D1 local integration tests (no credentials required)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"
      - name: Install dependencies
        run: bun install
      - name: D1 local integration tests
        run: bun run --filter astropress test --reporter=verbose tests/d1-local-integration.test.ts
