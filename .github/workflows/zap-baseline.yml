name: ZAP Baseline

on:
  push:
    branches:
      - main
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  baseline:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24.8"
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun run --filter "@astropress-diy/astropress" build
      - run: bun run test:example
      - run: bun run --filter astropress-example-gh-pages build
      - name: Start static server with security headers
        run: node tooling/scripts/serve-static-with-security-headers.mjs examples/github-pages/dist 4173 >/tmp/astropress-http.log 2>&1 &
      - name: Run ZAP baseline scan
        run: |
          # ZAP runs as uid 'zap' (1000) inside the container; the workspace is
          # owned by the runner.  Pre-create output files so the container can
          # write to them without needing write permission on the directory itself.
          touch zap-report.json zap-report.md zap-report.html
          chmod a+w zap-report.json zap-report.md zap-report.html
          docker pull ghcr.io/zaproxy/zaproxy:stable -q
          docker run --network=host -v "$PWD:/zap/wrk/:rw" -t ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py -t http://127.0.0.1:4173 -J zap-report.json -w zap-report.md -r zap-report.html -a -l WARN \
            -c /zap/wrk/.github/zap-rules.conf
