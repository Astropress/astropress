name: ZAP Baseline

on:
  push:
    branches:
      - main
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  baseline:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "24.8"
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun run --filter "@astropress-diy/astropress" build
      - run: bun run test:example
      - run: bun run --filter astropress-example-gh-pages build
      - run: python3 -m http.server 4173 --directory examples/github-pages/dist >/tmp/astropress-http.log 2>&1 &
      - uses: zaproxy/action-baseline@v0.12.0
        with:
          target: "http://127.0.0.1:4173"
          cmd_options: "-a -l WARN"
          fail_action: true
          allow_issue_writing: false
