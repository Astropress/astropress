name: Mutation Testing

on:
  schedule:
    - cron: "0 6 * * 1" # Monday 6am UTC
  workflow_dispatch:
    inputs:
      scope:
        description: "Scope: full (all source) or critical (security paths only)"
        required: false
        default: "full"
        type: choice
        options:
          - full
          - critical

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  stryker:
    name: Stryker (TypeScript)
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24.8"

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - run: bun install --frozen-lockfile

      - name: Run Stryker (full suite)
        if: inputs.scope != 'critical'
        run: npx stryker run ../../stryker.config.mjs
        working-directory: packages/astropress

      - name: Run Stryker (critical paths only)
        if: inputs.scope == 'critical'
        run: npx stryker run ../../stryker-critical.config.mjs
        working-directory: packages/astropress

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: stryker-report
          path: reports/mutation/

  cargo-mutants:
    name: cargo-mutants (Rust)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - run: cargo install cargo-mutants

      - name: Run cargo-mutants (full crate)
        run: cargo mutants --package astropress-cli --timeout 60
        working-directory: crates

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: cargo-mutants-report
          path: crates/mutants.out/
