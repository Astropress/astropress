name: CI

on:
  push:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24.8"
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lockb') }}
          restore-keys: ${{ runner.os }}-bun-
      - run: bun install --frozen-lockfile
      - run: bun run audit:deps
      - run: bun run audit:security
      - run: bun run audit:honesty
      - run: bun run audit:microcopy
      - run: bun run check:version
      - run: bun run audit:arch
      - run: bunx biome check --reporter=github packages/astropress/src packages/astropress/tests packages/astropress/web-components
      - run: bun run audit:deps:graph
      - run: bun run audit:tooling-types
      - run: bun run audit:aeo
      - run: bun run audit:providers
      - run: bun run audit:cli-docs
      - run: bun run audit:env-contract
      - run: bun run audit:exports
      - run: bun run audit:crypto
      - run: bun run audit:web-components
      - run: bun run audit:navigation
      - run: bun run audit:interaction
      - run: bun run audit:error-handling
      - run: bun run audit:caching
      - run: bun run audit:nexus
      - run: bun run audit:developer-ergonomics
      - run: bun run audit:dead-exports
      - run: bun run audit:bdd-wiring
      - run: bun run audit:no-stub-tests
      - run: bun run audit:evaluation-integrity
      - run: bun run audit:observability
      - run: bun run audit:api-design
      - run: bun run audit:ai-drivability
      - run: bun run audit:i18n
      - run: bun run audit:content-modeling
      - run: bun run audit:collaboration
      - run: bun run audit:oss-health
      - run: bun run audit:scaffold-quality
      - run: bun run docs:api:check
      - run: bun run docs:check
      - run: bun run repo:clean

  lint-rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lockb') }}
          restore-keys: ${{ runner.os }}-bun-
      - run: bun install --frozen-lockfile
      - run: cargo clippy --manifest-path crates/astropress-cli/Cargo.toml -- -D warnings
      - run: bun run audit:arch:rust

  platform-smoke:
    needs: [lint, lint-rust]
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24.8"
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lockb') }}
          restore-keys: ${{ runner.os }}-bun-
      - run: bun install --frozen-lockfile
      - run: bun run --filter "@astropress-diy/astropress" build
      - run: bun run test:cli
      - run: bun run --filter "@astropress-diy/astropress" test tests/project-env.test.ts tests/content-services-ops.test.ts tests/hosted-provider.contract.test.ts tests/provider-targets.test.ts
      - run: bun run test:example
      - run: bun run repo:clean

  test-unit:
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        bun: ["1.3.10", "latest"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24.8"
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ matrix.bun }}
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lockb') }}
          restore-keys: ${{ runner.os }}-bun-
      - run: bun install --frozen-lockfile
      - run: bun run test:coverage
      - run: bun run repo:clean

  test-cli:
    runs-on: ubuntu-latest
    needs: [lint, lint-rust]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24.8"
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lockb') }}
          restore-keys: ${{ runner.os }}-bun-
      - run: bun install --frozen-lockfile
      - run: bun run --filter "@astropress-diy/astropress" build
      - run: cargo test --manifest-path crates/astropress-cli/Cargo.toml

  test-e2e:
    runs-on: ubuntu-latest
    needs: test-unit
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24.8"
      - uses: oven-sh/setup-bun@v2
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lockb') }}
          restore-keys: ${{ runner.os }}-bun-
      - run: bun install --frozen-lockfile
      - run: bun run --filter "@astropress-diy/astropress" build
      - run: npx playwright install --with-deps chromium
      - run: bun run test:accessibility
      - run: bun run test:acceptance

  # Boots examples/npm-consumer-smoke (workspace:* but WITHOUT monorepo source aliases)
  # and fetches every admin route. Catches 500s and import-resolution failures that
  # are invisible to the workspace-aliased admin-harness. Also runs packaging audits.
  test-consumer:
    runs-on: ubuntu-latest
    needs: test-unit
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24.8"
      - uses: oven-sh/setup-bun@v2
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lockb') }}
          restore-keys: ${{ runner.os }}-bun-
      - run: bun install
      - run: bun run --filter "@astropress-diy/astropress" build
      - run: bun run test:consumer-smoke
      - run: bun run audit:consumer-packaging
      - run: bun run audit:admin-route-coverage
      - run: bun run audit:title-composition
      - run: bun run audit:security-policy-integrity

  # Packs the npm tarball, installs it in a fresh copy of npm-consumer-smoke, and
  # verifies every admin route. This is the publish-time safety net: catches bugs
  # in compiled .astro pages (e.g. bare astropress/ imports) that only manifest
  # for real npm consumers, not workspace builds.
  test-tarball-smoke:
    runs-on: ubuntu-latest
    needs: test-unit
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24.8"
      - uses: oven-sh/setup-bun@v2
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lockb') }}
          restore-keys: ${{ runner.os }}-bun-
      - run: bun install
      - run: bun run test:tarball-smoke

  test-build-content:
    runs-on: ubuntu-latest
    needs: [lint, test-unit]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24.8"
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lockb') }}
          restore-keys: ${{ runner.os }}-bun-
      - run: bun install --frozen-lockfile
      - run: bun run --filter "@astropress-diy/astropress" build
      - run: npx playwright install --with-deps chromium
      - run: bun run test:example
      - run: bun run test:static-site
      - run: bun run audit:carbon
      - run: bun run audit:user-facing-route-coverage
      - run: bun run repo:clean

  test-build-harness:
    runs-on: ubuntu-latest
    needs: [lint, lint-rust, test-unit]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24.8"
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lockb') }}
          restore-keys: ${{ runner.os }}-bun-
      - run: bun install --frozen-lockfile
      - run: bun run --filter "@astropress-diy/astropress" build
      - run: npx playwright install --with-deps chromium
      - run: bun run test:admin-harness
      - run: bun run bdd:lint
      - run: bun run bdd:test
      - run: cd packages/astropress-mcp && bun run build
      - run: bun run repo:clean

  preview-deploy:
    runs-on: ubuntu-latest
    needs: [test-build-content, test-build-harness]
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24.8"
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lockb') }}
          restore-keys: ${{ runner.os }}-bun-
      - run: bun install --frozen-lockfile
      - run: bun run --filter "@astropress-diy/astropress" build
      - run: bun run --filter astropress-example-gh-pages build
      - name: Deploy preview to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy examples/github-pages/dist --project-name=astropress-preview --branch=${{ github.head_ref }}
        continue-on-error: true
      - name: Lighthouse CI against preview
        run: |
          if [ -n "${{ secrets.CLOUDFLARE_API_TOKEN }}" ]; then
            npx @lhci/cli@0.14 autorun --collect.url="https://astropress-preview.pages.dev" --assert.preset=lighthouse:recommended || true
          else
            echo "No Cloudflare credentials — skipping Lighthouse CI preview run"
          fi
