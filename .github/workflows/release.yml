name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  release:
    name: Publish to npm
    runs-on: ubuntu-latest
    outputs:
      published: ${{ steps.changesets.outputs.published }}
    permissions:
      actions: write
      contents: write
      pull-requests: write
      id-token: write  # required for npm trusted publishing (OIDC)
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: "24.8"

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - run: bun install --frozen-lockfile

      - uses: changesets/action@v1
        id: changesets
        with:
          publish: bun run release
          version: bun run version
          title: "chore: version packages"
          commit: "chore: version packages"
          # GitHub API commits are GitHub-signed and avoid local hook failures
          # on the runner when Changesets creates the version PR commit.
          commitMode: github-api
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # No NPM_TOKEN — npm uses the OIDC token from id-token: write above.
          # Each package (astropress, astropress-mcp, astropress-nexus) must be
          # registered as a trusted publisher on npmjs.com before this works.

      - name: Tag and dispatch CLI release
        if: steps.changesets.outputs.published == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(grep '^version' crates/astropress-cli/Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          TAG="cli-v${VERSION}"
          if git ls-remote --tags origin "refs/tags/${TAG}" | grep -q "${TAG}"; then
            echo "Tag ${TAG} already exists"
          else
            git tag "${TAG}"
            git push origin "${TAG}"
            echo "Pushed ${TAG}"
          fi

          gh workflow run cli-release.yml --ref "${TAG}"
          echo "Dispatched cli-release.yml for ${TAG}"

  publish-cli-crate:
    name: Publish CLI crate
    needs: release
    if: ${{ github.event_name == 'workflow_dispatch' || needs.release.outputs.published == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: rust-lang/crates-io-auth-action@v1

      - name: Publish astropress-cli
        run: cargo publish --manifest-path crates/astropress-cli/Cargo.toml
