name: Content-hash skip
description: >
  Short-circuit a CI job when its declared input paths are unchanged since the
  last successful run. Computes a stable hash via
  tooling/scripts/step-content-hash.ts and looks up a sentinel in actions/cache.
  Usage examples live in the workflow files under .github/workflows/.

inputs:
  step:
    description: "Step name as registered in STEP_INPUTS (step-content-hash.ts)"
    required: true
  variant:
    description: "Optional suffix to partition the cache (e.g. matrix.os, matrix.bun)"
    required: false
    default: ""

outputs:
  cache-hit:
    description: "'true' if the sentinel was restored, meaning the step can be skipped."
    value: ${{ steps.restore.outputs.cache-hit }}
  hash:
    description: "The content hash used for the cache key."
    value: ${{ steps.hash.outputs.hash }}

runs:
  using: composite
  steps:
    - id: validate
      shell: bash
      env:
        STEP_INPUT: ${{ inputs.step }}
        VARIANT_INPUT: ${{ inputs.variant }}
      run: |
        if [[ ! "$STEP_INPUT" =~ ^[A-Za-z0-9._-]+$ ]]; then
          echo "content-skip: step must contain only letters, numbers, dots, underscores, or hyphens" >&2
          exit 2
        fi

        if [[ -n "$VARIANT_INPUT" && ! "$VARIANT_INPUT" =~ ^[A-Za-z0-9._-]+$ ]]; then
          echo "content-skip: variant must be empty or contain only letters, numbers, dots, underscores, or hyphens" >&2
          exit 2
        fi

        echo "step=$STEP_INPUT" >> "$GITHUB_OUTPUT"
        echo "variant=$VARIANT_INPUT" >> "$GITHUB_OUTPUT"

    - id: hash
      shell: bash
      env:
        STEP_INPUT: ${{ steps.validate.outputs.step }}
      run: |
        h=$(bun run tooling/scripts/step-content-hash.ts "$STEP_INPUT")
        echo "hash=$h" >> "$GITHUB_OUTPUT"
        echo "content-skip: step=$STEP_INPUT hash=$h"

    - id: restore
      uses: actions/cache/restore@v5
      with:
        path: .ci-cache/${{ steps.validate.outputs.step }}-${{ steps.validate.outputs.variant }}.ok
        key: content-skip-${{ steps.validate.outputs.step }}-${{ steps.validate.outputs.variant }}-${{ steps.hash.outputs.hash }}
